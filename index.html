<!DOCTYPE html>
<html lang="id">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Resmi Kelas XII A</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

<body class="bg-[#0f172a] text-white">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md">
        <h1 class="text-2xl font-bold tracking-tighter text-blue-400">CLASSCORE.</h1>
        <div class="space-x-6 hidden md:block">
            <a href="#home" class="hover:text-blue-400 transition">Home</a>
            <a href="#gallery" class="hover:text-blue-400 transition">Gallery</a>
            <a href="#struktur" class="hover:text-blue-400 transition">Struktur</a>
        </div>
    </nav>

    <section id="home" class="py-24 text-center px-4">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent uppercase tracking-tighter">
            XII A - BEST CLASS
        </h2>
        <p class="text-slate-400 max-w-xl mx-auto text-lg mb-10 italic">
            "Solidaritas tanpa batas, Berjuang bersama untuk masa depan yang cerah."
        </p>
        <div class="flex justify-center">
            <a href="#gallery" class="bg-blue-600 hover:bg-blue-700 px-10 py-3 rounded-full font-semibold transition shadow-lg shadow-blue-500/30">
                Lihat Kenangan
            </a>
        </div>
    </section>

    <section id="gallery" class="py-20 max-w-6xl mx-auto px-6">
        <div class="text-center mb-12">
            <p class="text-blue-400 font-semibold tracking-widest uppercase text-sm">Our Memories</p>
            <h2 class="text-4xl font-bold mt-2 uppercase">Moments</h2>
            <div class="h-1 w-20 bg-blue-500 mx-auto mt-4 rounded-full"></div>
        </div>

        <div id="gallery-wrapper" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>

        <div class="flex justify-center mt-12 gap-2">
            <button onclick="renderGallery(1)" id="btn-1" class="page-nav w-10 h-10 rounded-full glass flex items-center justify-center text-sm font-bold transition">1</button>
            <button onclick="renderGallery(2)" id="btn-2" class="page-nav w-10 h-10 rounded-full glass flex items-center justify-center text-sm font-bold transition">2</button>
            <button onclick="renderGallery(3)" id="btn-3" class="page-nav w-10 h-10 rounded-full glass flex items-center justify-center text-sm font-bold transition">3</button>
        </div>
    </section>

    <section id="struktur" class="py-20 bg-white/5">
        <div class="max-w-6xl mx-auto px-6">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-bold uppercase">Struktur & Daftar Siswa</h2>
                <div class="h-1 w-20 bg-emerald-500 mx-auto mt-4 rounded-full"></div>
            </div>

            <div id="wali-kelas-container" class="flex justify-center mb-20"></div>

            <div id="pengurus-inti" class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-24 text-center"></div>

            <div class="text-center mb-10">
                <h3 class="text-xl font-semibold text-slate-500 italic uppercase tracking-widest">Daftar Siswa (34)</h3>
            </div>
            
            <div id="student-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-6"></div>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-600 border-t border-white/5">
        <p>© 2026 XII A - THE LEGENDS. All Rights Reserved.</p>
    </footer>

    <div id="lightbox" onclick="closeFullImage()">
        <span id="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Foto Besar">
    </div>

    <script src="js/script.js"></script>
</body>
</html>

        // LOGIKA AUTOMATION (JANGAN DIUBAH)
        function renderGallery(page) {
            const wrapper = document.getElementById('gallery-wrapper');
            wrapper.innerHTML = '';
            galleryData.filter(p => p.page === page).forEach(photo => {
                wrapper.innerHTML += `<div class="relative overflow-hidden rounded-2xl aspect-square glass group border border-white/5">
                    <img src="${photo.src}" onerror="this.src='https://via.placeholder.com/500?text=${photo.title}'" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition duration-500 group-hover:scale-110">
                </div>`;
            });
            document.querySelectorAll('.page-nav').forEach(b => b.classList.remove('active-page'));
            document.getElementById('btn-'+page).classList.add('active-page');
        }

        function initStructure() {
            document.getElementById('wali-kelas-container').innerHTML = `<div class="text-center group">
